# .github/workflows/build.yml
name: Build Go App for Multiple Platforms

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Define the platforms you want to build for
        platform:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build for ${{ matrix.platform.goos }}/${{ matrix.platform.goarch }}
        env:
          GOOS: ${{ matrix.platform.goos }}
          GOARCH: ${{ matrix.platform.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o ./bin/pasty-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }} ./

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pasty-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}
          path: ./bin/pasty-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}
      - name: Test
        run: go test -v ./...
